<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Fixture Mundial 2026</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #111827;
    }

    .filtros {
      text-align: center;
      margin-bottom: 20px;
    }

    input, select {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .partido {
      background: white;
      padding: 15px;
      margin: 12px auto;
      max-width: 800px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .equipos {
      font-size: 20px;
      font-weight: bold;
      text-align: center;
    }

    .detalle {
      text-align: center;
      color: #555;
      margin-top: 8px;
    }

    .estado {
      text-align: center;
      margin-top: 8px;
      font-weight: bold;
      color: #0066cc;
    }
  </style>
</head>
<body>

  <h1>Fixture Copa Mundial FIFA 2026</h1>

  <div class="filtros">
    <input type="text" id="buscar" placeholder="Buscar equipo...">
    <select id="fase">
      <option value="">Todas las fases</option>
      <option value="Grupos">Grupos</option>
      <option value="16avos">16avos</option>
      <option value="Octavos">Octavos</option>
      <option value="Cuartos">Cuartos</option>
      <option value="Semifinal">Semifinal</option>
      <option value="Final">Final</option>
    </select>
  </div>

  <div id="fixture"></div>

  <script>
    const urlCSV = https://docs.google.com/spreadsheets/d/e/2PACX-1vSyf6Uf79ysHr1lCKCodHGao4ZfI2vDdR_IFR7OuHnosJhZfPVA1TTjcl5CiaRPmCRdtcYdJ_060zKG/pub?output=csv;

    async function cargarFixture() {
      const respuesta = await fetch(urlCSV);
      const texto = await respuesta.text();

      const filas = texto.trim().split("\n").map(fila => fila.split(","));
      const encabezados = filas[0];

      const partidos = filas.slice(1).map(fila => {
        let obj = {};
        encabezados.forEach((col, i) => {
          obj[col.trim()] = fila[i]?.trim() || "";
        });
        return obj;
      });

      mostrarFixture(partidos);

      document.getElementById("buscar").addEventListener("input", () => mostrarFixture(partidos));
      document.getElementById("fase").addEventListener("change", () => mostrarFixture(partidos));
    }

    function mostrarFixture(partidos) {
      const contenedor = document.getElementById("fixture");
      const buscar = document.getElementById("buscar").value.toLowerCase();
      const fase = document.getElementById("fase").value;

      contenedor.innerHTML = "";

      const filtrados = partidos.filter(p => {
        const coincideEquipo =
          p.equipo1.toLowerCase().includes(buscar) ||
          p.equipo2.toLowerCase().includes(buscar);

        const coincideFase = fase === "" || p.fase === fase;

        return coincideEquipo && coincideFase;
      });

      filtrados.forEach(p => {
        const card = document.createElement("div");
        card.className = "partido";

        card.innerHTML = `
          <div class="equipos">
            ${p.equipo1} ${p.goles1 || "-"} vs ${p.goles2 || "-"} ${p.equipo2}
          </div>
          <div class="detalle">
            ${p.fecha} | ${p.hora} | ${p.grupo} | ${p.fase}
          </div>
          <div class="detalle">
            ${p.estadio} - ${p.ciudad}, ${p.pais}
          </div>
          <div class="estado">
            ${p.estado}
          </div>
        `;

        contenedor.appendChild(card);
      });
    }

    cargarFixture();
  </script>

</body>
</html>
