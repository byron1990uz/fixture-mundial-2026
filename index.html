<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Fixture Mundial 2026</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding: 20px;
	  
	        /* FONDO PERSONALIZADO */
      background:
        linear-gradient(rgba(0,0,0,.70), rgba(0,0,0,.70)),
        url('./fondo AND MUNDIAL.png');

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;

      color: white;

      min-height: 100vh;
    }

    h1 {
      text-align: center;
      font-size: 42px;
      margin-top: 30px;
      margin-bottom: 10px;

      text-shadow: 0 4px 10px rgba(0,0,0,.5);
    }

	.subtitulo {
      text-align: center;
      font-size: 18px;
      color: rgba(255,255,255,.85);

      margin-bottom: 40px;
    }
	
	.contenedor {
      max-width: 1200px;
      margin: auto;
    }
	
	
    .card {
      background: rgba(255,255,255,0.10);

      backdrop-filter: blur(10px);

      border-radius: 18px;

      padding: 20px;

      margin-bottom: 20px;

      border: 1px solid rgba(255,255,255,.15);

      box-shadow: 0 8px 25px rgba(0,0,0,.30);
    }


    .fase {
      font-size: 14px;
      color: #2563eb;
      font-weight: bold;
    }

    .equipos {
      font-size: 22px;
      text-align: center;
      font-weight: bold;
      margin: 10px 0;
    }

    .detalle {
      text-align: center;
      color: #555;
      font-size: 14px;
    }

    .estado {
      text-align: center;
      margin-top: 8px;
      font-weight: bold;
      color: #16a34a;
    }
  </style>
</head>
<body>

<h1>Fixture Copa Mundial FIFA 2026</h1>

<div id="fixture"></div>

<script>
const urlCSV = https://docs.google.com/spreadsheets/d/e/2PACX-1vQM2-mAmwqFb7_VbRjnbNFgyzfM4BDdadv2kxRqQXY8B07vqvAjSG1GbqbXI10EEA/pub?output=csv;

async function cargarDatos() {
  const res = await fetch(urlCSV);
  const texto = await res.text();

  const filas = texto.trim().split("\n").map(f => f.split(","));
  const headers = filas[0].map(h => h.trim());

  const datos = filas.slice(1).map(fila => {
    let obj = {};
    headers.forEach((h, i) => obj[h] = fila[i] || "");
    return obj;
  });

  mostrarFixture(datos);
}

function mostrarFixture(partidos) {
  const contenedor = document.getElementById("fixture");
  contenedor.innerHTML = "";

  partidos.forEach(p => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="fase">${p.fase || ""} ${p.grupo ? "- Grupo " + p.grupo : ""}</div>

      <div class="equipos">
        ${p.equipo1 || "Por definir"}
        ${p.goles1 || "-"} : ${p.goles2 || "-"}
        ${p.equipo2 || "Por definir"}
      </div>

      <div class="detalle">
        ${p.fecha || ""} | ${p.hora || ""}
      </div>

      <div class="detalle">
        ${p.estadio || ""} ${p.ciudad ? "- " + p.ciudad : ""}
      </div>

      <div class="estado">
        ${p.estado || "Pendiente"}
      </div>
    `;

    contenedor.appendChild(card);
  });
}

cargarDatos();
</script>

</body>
</html>
