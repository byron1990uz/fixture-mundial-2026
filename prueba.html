<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Fixture Mundial 2026</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;

      background:
        linear-gradient(rgba(0, 0, 0, .75),
          rgba(0, 0, 0, .75)),
        url('./fondo-mundial.png');

      background-size: cover;
      background-position: center;
      background-attachment: fixed;

      color: white;

      min-height: 100vh;

      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 42px;
      margin-bottom: 10px;
    }

    .subtitulo {
      text-align: center;
      margin-bottom: 30px;
      color: rgba(255,255,255,.8);
    }

    .filtros {
      max-width: 1200px;
      margin: auto;

      display: flex;
      gap: 15px;
      flex-wrap: wrap;

      justify-content: center;

      margin-bottom: 30px;
    }

    input,
    select {
      padding: 12px 16px;

      border: none;
      border-radius: 12px;

      background: rgba(255,255,255,.15);

      color: white;

      backdrop-filter: blur(10px);

      min-width: 220px;
    }

    input::placeholder {
      color: rgba(255,255,255,.7);
    }

    option {
      color: black;
    }

    #fixture {
      max-width: 1200px;
      margin: auto;

      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));

      gap: 20px;
    }

    .card {
      background: rgba(255,255,255,.10);

      backdrop-filter: blur(12px);

      border-radius: 20px;

      padding: 20px;

      border: 1px solid rgba(255,255,255,.15);

      box-shadow: 0 10px 30px rgba(0,0,0,.35);

      transition: .3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .fase {
      font-size: 13px;
      color: #60a5fa;

      margin-bottom: 10px;

      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .equipos {
      text-align: center;

      font-size: 24px;
      font-weight: bold;

      margin: 20px 0;
    }

    .resultado {
      font-size: 34px;
      color: #22c55e;

      margin: 0 10px;
    }

    .detalle {
      text-align: center;

      color: rgba(255,255,255,.85);

      margin-top: 10px;

      font-size: 14px;
    }

    .estado {
      text-align: center;

      margin-top: 15px;

      font-weight: bold;

      color: #facc15;
    }

    @media(max-width:768px) {

      h1 {
        font-size: 28px;
      }

      .equipos {
        font-size: 18px;
      }

      .resultado {
        font-size: 24px;
      }

      input,
      select {
        width: 100%;
      }

    }
  </style>
</head>

<body>

  <h1>COPA MUNDIAL FIFA 2026</h1>

  <div class="subtitulo">
    Fixture Oficial Interactivo
  </div>

  <div class="filtros">

    <input
      type="text"
      id="buscar"
      placeholder="Buscar equipo...">

    <select id="fase">
      <option value="">Todas las fases</option>
      <option value="Grupos">Fase de grupos</option>
      <option value="Ronda_32">Ronda de 32</option>
      <option value="Octavos">Octavos</option>
      <option value="Cuartos">Cuartos</option>
      <option value="Semifinal">Semifinal</option>
      <option value="Final">Final</option>
    </select>

  </div>

  <div id="fixture"></div>

  <script>

    const urlCSV =
      "https://docs.google.com/spreadsheets/d/e/2PACX-1vTI-SJcBOdYUf0BOGWuKNRYyofLFBZdDdYlTNjklAg7UYVjI_rHuheHtFyvLTH8rw/pub?gid=534628115&single=true&output=csv";

    async function cargarDatos() {

      const res = await fetch(urlCSV);

      const texto = await res.text();

      const filas = texto.trim().split("\n")
        .map(f => f.split(","));

      const headers =
        filas[0].map(h => h.trim());

      const datos = filas.slice(1).map(fila => {

        let obj = {};

        headers.forEach((h, i) => {
          obj[h] = fila[i] || "";
        });

        return obj;

      });

      mostrarFixture(datos);

      document
        .getElementById("buscar")
        .addEventListener("input",
          () => mostrarFixture(datos));

      document
        .getElementById("fase")
        .addEventListener("change",
          () => mostrarFixture(datos));

    }

    function mostrarFixture(partidos) {

      const contenedor =
        document.getElementById("fixture");

      const buscar =
        document.getElementById("buscar")
          .value.toLowerCase();

      const fase =
        document.getElementById("fase")
          .value;

      contenedor.innerHTML = "";

      const filtrados =
        partidos.filter(p => {

          const coincideEquipo =
            (p.equipo1 || "")
            .toLowerCase()
            .includes(buscar)

            ||

            (p.equipo2 || "")
            .toLowerCase()
            .includes(buscar);

          const coincideFase =
            fase === ""
            ||
            p.fase === fase;

          return coincideEquipo
            &&
            coincideFase;

        });

      filtrados.forEach(p => {

        const card =
          document.createElement("div");

        card.className = "card";

        card.innerHTML = `

          <div class="fase">
            ${p.fase || ""}
            ${p.grupo ? "- Grupo " + p.grupo : ""}
          </div>

          <div class="equipos">

            ${p.equipo1 || "Por definir"}

            <span class="resultado">
              ${p.goles1 || "-"}
              :
              ${p.goles2 || "-"}
            </span>

            ${p.equipo2 || "Por definir"}

          </div>

          <div class="detalle">
            📅 ${p.fecha || ""}
            |
            ⏰ ${p.hora || ""}
          </div>

          <div class="detalle">
            🏟️ ${p.estadio || ""}
          </div>

          <div class="detalle">
            📍 ${p.ciudad || ""}
          </div>

          <div class="estado">
            ${p.estado || "Pendiente"}
          </div>

        `;

        contenedor.appendChild(card);

      });

    }

    cargarDatos();

  </script>

</body>

</html>
